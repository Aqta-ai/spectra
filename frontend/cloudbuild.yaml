steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_WS_URL=${_NEXT_PUBLIC_WS_URL}'
      - '-t'
      - '${_IMAGE}'
      - '.'

images:
  - '${_IMAGE}'

substitutions:
  _NEXT_PUBLIC_WS_URL: 'ws://localhost:8080/ws'
  _IMAGE: 'gcr.io/PROJECT_ID/spectra-frontend:latest'
