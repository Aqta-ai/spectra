# Spectra — CI/CD Pipeline
# Builds, tests, and deploys to Google Cloud Run on push to main.
# Required GitHub Secrets:
#   GCP_PROJECT_ID   — Google Cloud project ID (e.g. analog-sum-485815-j3)
#   GCP_SA_KEY       — Service account JSON key (base64-encoded)
#   GOOGLE_API_KEY   — Gemini API key

name: Deploy Spectra

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: europe-west1
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  # ── Lint & type-check frontend ─────────────────────────────────────────────
  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  # ── Lint + compile backend ────────────────────────────────────────────────
  check-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
        working-directory: backend
      - run: python -m py_compile app/main.py app/streaming/session.py
        working-directory: backend

  # ── Deploy backend to Cloud Run ───────────────────────────────────────────
  deploy-backend:
    needs: [check-frontend, check-backend]
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build & push backend image
        working-directory: backend
        run: |
          gcloud builds submit \
            --tag "gcr.io/${{ env.PROJECT_ID }}/spectra-backend:${{ github.sha }}" \
            --project "${{ env.PROJECT_ID }}" \
            --quiet

      - name: Deploy backend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: spectra-backend
          image: gcr.io/${{ env.PROJECT_ID }}/spectra-backend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated
            --memory=1Gi
            --cpu=2
            --timeout=3600
            --session-affinity
            --concurrency=20
            --min-instances=1
            --max-instances=10
          env_vars: |
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            LOG_LEVEL=WARNING
            ALLOWED_ORIGINS=https://spectra.aqta.ai

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "${{ steps.deploy.outputs.url }}/health"; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Backend health check did not pass within 25s"

  # ── Deploy frontend to Cloud Run ──────────────────────────────────────────
  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # NEXT_PUBLIC_* vars must be baked in at build time — runtime env vars
      # arrive too late for Next.js static bundles. We derive the WS URL from
      # the backend URL output by the previous job.
      - name: Compute WS URL
        id: ws
        run: |
          BACKEND_URL="${{ needs.deploy-backend.outputs.backend_url }}"
          WS_URL="${BACKEND_URL/https:\/\//wss://}/ws"
          echo "url=${WS_URL}" >> "$GITHUB_OUTPUT"

      - name: Build frontend image (WS URL baked in)
        run: |
          IMAGE="gcr.io/${{ env.PROJECT_ID }}/spectra-frontend:${{ github.sha }}"
          gcloud builds submit ./frontend \
            --project "${{ env.PROJECT_ID }}" \
            --config frontend/cloudbuild.yaml \
            --substitutions "_NEXT_PUBLIC_WS_URL=${{ steps.ws.outputs.url }},_IMAGE=${IMAGE}" \
            --quiet

      - name: Deploy frontend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: spectra-frontend
          image: gcr.io/${{ env.PROJECT_ID }}/spectra-frontend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --min-instances=0
            --max-instances=10

      - name: Summary
        run: |
          echo "## Spectra Deployed 🔮" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service  | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | ${{ needs.deploy-backend.outputs.backend_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WS       | ${{ steps.ws.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
