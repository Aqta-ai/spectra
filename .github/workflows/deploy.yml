# Spectra — CI/CD Pipeline
# Builds, tests, and deploys to Google Cloud Run on push to main.
# Requires these GitHub Secrets:
#   GCP_PROJECT_ID       — Google Cloud project ID
#   GCP_SA_KEY           — Service account JSON key (base64-encoded)
#   GOOGLE_API_KEY       — Gemini API key
#   GCP_REGION           — (optional) defaults to us-central1

name: Deploy Spectra

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  # ── Lint & type-check frontend ──────────────────────────────────────────
  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  # ── Lint + test backend ─────────────────────────────────────────────────
  check-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
        working-directory: backend
      - run: python -m py_compile app/main.py
        working-directory: backend
      - run: python -m pytest tests/ -x -q --tb=short
        working-directory: backend

  # ── Deploy backend to Cloud Run ─────────────────────────────────────────
  deploy-backend:
    needs: [check-frontend, check-backend]
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build & push backend image
        run: |
          gcloud builds submit \
            --tag "gcr.io/${{ env.PROJECT_ID }}/spectra-backend" \
            --project "${{ env.PROJECT_ID }}" \
            --quiet
        working-directory: backend

      - name: Deploy backend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: spectra-backend
          image: gcr.io/${{ env.PROJECT_ID }}/spectra-backend
          region: ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated
            --memory=1Gi
            --cpu=2
            --timeout=300
            --concurrency=80
            --min-instances=0
            --max-instances=10
          env_vars: |
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            GCP_PROJECT_ID=${{ env.PROJECT_ID }}
            LOG_LEVEL=INFO
            ALLOWED_ORIGINS=https://spectra.aqta.ai

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "${{ steps.deploy.outputs.url }}/health"; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Backend health check did not pass within 25s"

  # ── Deploy frontend to Cloud Run ────────────────────────────────────────
  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build & push frontend image
        run: |
          gcloud builds submit \
            --tag "gcr.io/${{ env.PROJECT_ID }}/spectra-frontend" \
            --project "${{ env.PROJECT_ID }}" \
            --quiet
        working-directory: frontend

      - name: Deploy frontend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: spectra-frontend
          image: gcr.io/${{ env.PROJECT_ID }}/spectra-frontend
          region: ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --min-instances=0
            --max-instances=10
          env_vars: |
            NEXT_PUBLIC_WS_URL=wss://api.spectra.aqta.ai/ws

      - name: Summary
        run: |
          echo "## Spectra Deployed 🔮" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service  | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | ${{ needs.deploy-backend.outputs.backend_url }} |" >> $GITHUB_STEP_SUMMARY
